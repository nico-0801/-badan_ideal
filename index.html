<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdealBody | Cek Berat Badan Ideal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="glass max-w-md w-full rounded-3xl shadow-2xl p-8 transform transition-all hover:scale-[1.01]">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">IdealBody✨</h1>
            <p class="text-gray-500 mt-2">Temukan komposisi tubuh sehatmu</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Tinggi Badan (cm)</label>
                <input type="number" id="height" placeholder="Contoh: 170" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Berat Badan (kg)</label>
                <input type="number" id="weight" placeholder="Contoh: 65" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button onclick="calculateBMI()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Hitung Sekarang
            </button>
        </div>

        <div id="resultArea" class="hidden mt-8 p-6 rounded-2xl bg-gray-50 border border-gray-100 text-center animate-fade-in">
            <h2 class="text-gray-600 text-sm font-medium uppercase tracking-widest">Skor BMI Anda</h2>
            <div id="bmiValue" class="text-5xl font-black text-indigo-600 my-2">0.0</div>
            <p id="bmiStatus" class="text-lg font-semibold text-gray-800"></p>
            <p id="idealRange" class="text-sm text-gray-500 mt-2"></p>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const height = document.getElementById('height').value / 100;
            const weight = document.getElementById('weight').value;
            const resultArea = document.getElementById('resultArea');

            if (height > 0 && weight > 0) {
                const bmi = (weight / (height * height)).toFixed(1);
                let status = "";
                let color = "";

                if (bmi < 18.5) {
                    status = "Kekurangan Berat Badan 🪶";
                    color = "#3b82f6";
                } else if (bmi < 25) {
                    status = "Berat Badan Ideal ✅";
                    color = "#10b981";
                } else if (bmi < 30) {
                    status = "Kelebihan Berat Badan ⚖️";
                    color = "#f59e0b";
                } else {
                    status = "Obesitas ⚠️";
                    color = "#ef4444";
                }

                // Hitung Berat Ideal (Rumus Broca sederhana)
                const idealMin = (18.5 * (height * height)).toFixed(1);
                const idealMax = (24.9 * (height * height)).toFixed(1);

                document.getElementById('bmiValue').innerText = bmi;
                document.getElementById('bmiValue').style.color = color;
                document.getElementById('bmiStatus').innerText = status;
                document.getElementById('idealRange').innerText = `Rentang ideal: ${idealMin}kg - ${idealMax}kg`;
                
                resultArea.classList.remove('hidden');
            } else {
                alert("Mohon masukkan angka yang valid!");
            }
        }
    </script>
</body>
</html>
